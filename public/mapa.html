<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auckland & Rotorua — Mapa del Itinerario</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: 360px; flex-shrink: 0; height: 100%; overflow-y: auto;
    background: #FAFBFA; border-right: 1px solid #DCE3DD;
  }
  .header { background: #1F4D3D; color: #fff; padding: 20px 22px; }
  .header h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.2px; }
  .header p { font-size: 12px; color: #BFE0D5; margin-top: 4px; }

  .day-block { padding: 6px 0; }
  .day-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 22px 8px; position: sticky; top: 0; background: #FAFBFA; z-index: 5;
  }
  .day-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
  .day-head-txt { flex: 1; min-width: 0; }
  .day-head h2 { font-size: 13px; font-weight: 700; color: #243029; }
  .day-head span { font-size: 11px; color: #6B7770; font-weight: 500; }
  .day-route { flex-shrink: 0; align-self: center; font-size: 10.5px; font-weight: 700;
    color: #1F4D3D; background: #E6F0EA; border: 1px solid #BFD8CB; border-radius: 100px;
    padding: 4px 10px; text-decoration: none; white-space: nowrap; }
  .day-route:hover { background: #D8E9DE; }

  .stop {
    display: flex; gap: 12px; padding: 9px 22px; cursor: pointer;
    border-left: 3px solid transparent; transition: background .15s;
  }
  .stop:hover { background: #EEF3EF; }
  .stop.active { background: #E6F0EA; border-left-color: #1F4D3D; }
  .stop .num {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
    color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; margin-top: 1px;
  }
  .stop .body h3 { font-size: 13px; font-weight: 600; color: #1E2A23; line-height: 1.3; }
  .stop .body .time { font-size: 11px; font-weight: 600; color: #0F6E6E; margin-bottom: 1px; }
  .stop .body .note { font-size: 11px; color: #6B7770; line-height: 1.4; margin-top: 2px; }
  .stop .body .resv { display:inline-block; margin-top:5px; font-size:11px; font-weight:700;
    color:#B08D57; text-decoration:none; border-bottom:1.5px solid #B08D57; padding-bottom:1px; }

  .footnote { padding: 16px 22px 28px; font-size: 10.5px; color: #8A938C; line-height: 1.5; border-top: 1px solid #E4EAE5; margin-top: 6px; }

  /* Map */
  #map { flex: 1; height: 100%; }
  .leaflet-popup-content { font-family: inherit; margin: 12px 14px; }
  .pop h4 { font-size: 13px; color: #1F4D3D; margin-bottom: 3px; }
  .pop .pt { font-size: 11px; font-weight: 600; color: #0F6E6E; }
  .pop .pn { font-size: 11px; color: #555; margin-top: 4px; line-height: 1.4; }
  .pop .pr { display:inline-block; margin-top:6px; font-size:11px; font-weight:700; color:#B08D57; }

  .marker-pin {
    width: 26px; height: 26px; border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg); border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center;
  }
  .marker-pin span { transform: rotate(45deg); color: #fff; font-size: 12px; font-weight: 700; }
  .marker-pin--extra { background: #C98A3B; border-style: dashed; }

  .num--extra { background: #C98A3B !important; }
  .stop-extra { display:inline-block; margin-right:6px; font-size:9px; font-weight:800; letter-spacing:.05em;
    text-transform:uppercase; color:#8a5a1f; background:#F6ECDD; border:1px solid #E6D3B3;
    border-radius:100px; padding:1px 6px; vertical-align:middle; }
  .stop--extra { border-left: 3px dashed #C98A3B; }
  .pop .pe { font-size:10px; font-weight:800; letter-spacing:.04em; text-transform:uppercase;
    color:#8a5a1f; margin-top:3px; }

  @media (max-width: 760px) {
    #app { flex-direction: column; }
    #sidebar { width: 100%; height: 45%; }
    #map { height: 55%; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="header">
      <a href="index.html" style="display:inline-block;color:#BFE0D5;font-size:12px;font-weight:600;text-decoration:none;margin-bottom:8px">← Itinerario</a>
      <h1>Auckland &amp; Rotorua — Itinerario</h1>
      <p>Vie 11 Dic &nbsp;—&nbsp; Lun 14 Dic, 2026 · Luna de Miel</p>
    </div>
    <div id="list"></div>
    <div class="footnote">
      Toca cualquier parada para volar a ella en el mapa. Las líneas muestran las conexiones por día.<br><br>
      Los mosaicos del mapa requieren conexión a internet. © OpenStreetMap contributors.
    </div>
  </div>
  <div id="map"></div>
</div>

<script>
// Coordenadas verificadas contra OpenStreetMap (objetos exactos: terminales, direcciones, parkings).
const DAYS = [
  {
    name: "Vie 11 Dic — Auckland", theme: "Waiheke Island · Vinos", color: "#2F6FB0",
    gmaps: "https://www.google.com/maps/dir/?api=1&origin=-36.84335,174.76654&destination=-36.78059,174.99168&travelmode=transit",
    stops: [
      { t: "9:00 a.m.", n: "Downtown Ferry Terminal", lat: -36.84275, lng: 174.76704,
        d: "A ~2 min del Hotel InterContinental. Ferry a Matiatia (~45 min)." },
      { t: "10:40 a.m. – ~3:10 p.m.", n: "Wine Tour — Matiatia Ferry Terminal (Waiheke)", lat: -36.78059, lng: 174.99168,
        d: "Tour en grupo (4.5 h): 3 viñedos top y ~15 vinos. Sin almuerzo. USD 412.62. Encuentro en Matiatia Ferry Terminal.",
        link: "https://www.viator.com/tours/Waiheke-Island/4-hour-SCENIC-WINE-Tour-with-a-Private-Guide-and-12-tastings/d32653-62882P4?pid=P00001955&uid=U00767249&mcid=58086&currency=USD" }
    ]
  },
  {
    name: "Sáb 12 Dic — Auckland → Rotorua", theme: "Día de traslado", color: "#1F8A7A",
    gmaps: "https://www.google.com/maps/dir/?api=1&origin=-36.84835,174.75927&destination=-38.10875,176.24180&waypoints=-38.26087,175.10354%7C-38.03574,175.84193&travelmode=driving",
    stops: [
      { t: "7:30 a.m.", n: "Recoger auto — Hertz Auckland Downtown", lat: -36.84835, lng: 174.75927,
        d: "154 Victoria Street West. Retiro del auto (Mazda MX-5 convertible) a las 7:30 a.m. Desde aquí ~3 h en auto hasta Waitomo. Devolución 15 dic en Auckland Airport." },
      { t: "11:40 a.m.", n: "Waitomo Glowworm Caves", lat: -38.26087, lng: 175.10354,
        d: "39 Waitomo Village Road. Horario confirmado 11:40 a.m. USD 100.20.",
        link: "https://www.viator.com/tours/Waitomo/Waitomo-Glowworm-Caves-Guided-Tour/d27469-3930P3?pid=P00001955&uid=U00767249&mcid=58086&currency=USD" },
      { t: "Tarde", n: "Blue Spring — Te Waihou Walkway", lat: -38.03574, lng: 175.84193,
        d: "Estacionamiento oficial de Leslie Road (acceso corto al manantial). ~1 h 15 min desde Waitomo." },
      { t: "Fin de la tarde", n: "Black Swan Lakeside Hotel", lat: -38.10875, lng: 176.24180,
        d: "Check-in en Rotorua. 171 Kawaha Point Road." }
    ]
  },
  {
    name: "Dom 13 Dic — Rotorua", theme: "Aventura", color: "#7B5EA7",
    gmaps: "https://www.google.com/maps/dir/?api=1&origin=-38.10875,176.24180&destination=-38.17578,176.25323&waypoints=-38.05189,176.33803%7C-38.31539,176.37569&travelmode=driving",
    stops: [
      { t: "9:00 a.m.", n: "Jet Ski — Okawa Bay Boat Ramp", lat: -38.05189, lng: 176.33803,
        d: "Jet Ski a las Sacred Hot Pools (tándem). Rampa pública de Ōkawa Bay (Lake Rotoiti), ~25 min del hotel." },
      { t: "2:00 p.m.", n: "Mt Kakaramea (Rainbow Mountain) Summit Track", lat: -38.31539, lng: 176.37569,
        d: "Hike a la cumbre (~3 h) a las 2:00 p.m. Estacionamiento DOC del track sobre la SH5 (gratis), ~30 min al sur de Rotorua." },
      { t: "5:30 p.m.", n: "Secret Spot Hot Tubs", lat: -38.17578, lng: 176.25323,
        d: "Baño en los hot tubs del bosque a las 5:30 p.m. 13/33 Waipa State Mill Road, ~15 min del hotel.",
        link: "https://www.viator.com/tours/Rotorua/Secret-Spot-Hot-Tub-soak/d395-210014P1?pid=P00001955&uid=U00767249&mcid=58086&currency=USD" }
    ]
  },
  {
    name: "Lun 14 Dic — Rotorua", theme: "Aventura & Spa", color: "#C96A4B",
    gmaps: "https://www.google.com/maps/dir/?api=1&origin=-38.10875,176.24180&destination=-38.13798,176.25827&waypoints=-38.15858,176.27019%7C-38.01782,176.34348&travelmode=driving",
    stops: [
      { t: "8:30 a.m.", n: "Redwoods — Hike (Long Mile Rd)", lat: -38.15858, lng: 176.27019,
        d: "Caminata de ~1.5 h por Whakarewarewa Forest a las 8:30 a.m. desde el visitor centre (Long Mile Rd / Tītokorangi Dr)." },
      { t: "1:00 p.m.", n: "Kaituna River Rafting", lat: -38.01782, lng: 176.34348,
        d: "White water rafting a la 1:00 p.m. 761 State Highway 33, Okere Falls. ~30 min del hotel.",
        link: "https://www.viator.com/tours/Rotorua/Kaituna-River-White-Water-Rafting/d395-17658P1?pid=P00001955&uid=U00767249&mcid=58086&currency=USD" },
      { t: "5:45 p.m.", n: "Polynesian Spa", lat: -38.13798, lng: 176.25827,
        d: "Deluxe Romantic Package, 5:45 p.m. 1000 Hinemoa Street. Abierto hasta las 7:00 p.m. ~10 min del hotel.",
        link: "https://www.polynesianspa.co.nz/vitality-day-escape-retreat-nz/" }
    ]
  }
];

const map = L.map('map', { scrollWheelZoom: true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '© OpenStreetMap'
}).addTo(map);

const allLatLng = [];
const markerRefs = [];
const list = document.getElementById('list');

DAYS.forEach((day, di) => {
  // Route line connects only the main (non-extra) stops
  const linePts = day.stops.filter(s => !s.hideMarker && !s.extra).map(s => {
    let la = s.lat, ln = s.lng;
    if (s.offset) { la += 0.004; ln += 0.004; }
    return [la, ln];
  });
  if (linePts.length > 1) {
    L.polyline(linePts, { color: day.color, weight: 3, opacity: 0.55, dashArray: '6,8' }).addTo(map);
  }

  const block = document.createElement('div');
  block.className = 'day-block';
  const routeBtn = day.gmaps
    ? `<a class="day-route" href="${day.gmaps}" target="_blank" rel="noopener" title="Abrir la ruta completa del día en Google Maps">🧭 Ruta del día</a>`
    : '';
  block.innerHTML = `<div class="day-head"><span class="day-dot" style="background:${day.color}"></span>
    <div class="day-head-txt"><h2>${day.name}</h2><span>${day.theme}</span></div>${routeBtn}</div>`;

  let num = 0; // sequential counter for main stops; extras are marked with a star
  day.stops.forEach((s) => {
    let la = s.lat, ln = s.lng;
    if (s.offset) { la += 0.004; ln += 0.004; }
    allLatLng.push([la, ln]);

    const label = s.extra ? '★' : String(++num);
    const pinStyle = s.extra ? '' : `background:${day.color}`;
    const pinClass = s.extra ? 'marker-pin marker-pin--extra' : 'marker-pin';

    let marker = null;
    if (!s.hideMarker) {
      const icon = L.divIcon({
        className: '', iconSize: [26,26], iconAnchor: [13,26], popupAnchor: [0,-26],
        html: `<div class="${pinClass}" style="${pinStyle}"><span>${label}</span></div>`
      });
      marker = L.marker([la, ln], { icon }).addTo(map);
      const resv = s.link ? `<br><a class="pr" href="${s.link}" target="_blank" rel="noopener">Reserva ›</a>` : '';
      const extraTag = s.extra ? `<div class="pe">Actividad extra · opcional</div>` : '';
      marker.bindPopup(`<div class="pop"><div class="pt">${s.t}</div><h4>${s.n}</h4>${extraTag}<div class="pn">${s.d}${resv}</div></div>`);
    }
    markerRefs.push({ marker, lat: la, lng: ln });

    const resvRow = s.link ? `<a class="resv" href="${s.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Reserva</a>` : '';
    const extraChip = s.extra ? `<span class="stop-extra">Extra</span>` : '';
    const numClass = s.extra ? 'num num--extra' : 'num';
    const row = document.createElement('div');
    row.className = 'stop' + (s.extra ? ' stop--extra' : '');
    row.innerHTML = `<div class="${numClass}" style="${pinStyle}">${label}</div>
      <div class="body"><div class="time">${s.t}</div><h3>${extraChip}${s.n}</h3><div class="note">${s.d}</div>${resvRow}</div>`;
    row.addEventListener('click', () => {
      document.querySelectorAll('.stop').forEach(e => e.classList.remove('active'));
      row.classList.add('active');
      map.flyTo([la, ln], 13, { duration: 0.8 });
      if (marker) setTimeout(() => marker.openPopup(), 600);
    });
    block.appendChild(row);
  });

  list.appendChild(block);
});

map.fitBounds(allLatLng, { padding: [50, 50] });
</script>
</body>
</html>
